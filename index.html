<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>🏍️ 全国ツーリング記録帳</title>
<style>
:root{--bg:#0F1117;--bg2:#1A1D27;--bg3:#242838;--border:#2E3347;--text:#F0F2F8;--text2:#8B91A8;--text3:#5A6078;--amber:#E8A020;--green:#4CAF72;--blue:#5B9BF0;--red:#E05555;--gray:#5A6078;--radius:10px;--rsm:6px}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Hiragino Sans',sans-serif;min-height:100vh;font-size:14px}
.hdr{background:linear-gradient(135deg,#1A1D27,#242838);border-bottom:1px solid var(--border);padding:14px 14px 0;position:sticky;top:0;z-index:50}
.hdr-top{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.hdr-title{font-size:15px;font-weight:600}.hdr-sub{font-size:10px;color:var(--text2);margin-top:1px}
.hdr-btns{margin-left:auto;display:flex;gap:6px}
.hbtn{display:flex;align-items:center;gap:4px;padding:6px 10px;border:none;border-radius:var(--rsm);font-size:11px;font-weight:500;cursor:pointer}
.hbtn-e{background:var(--amber);color:#fff}.hbtn-i{background:var(--bg3);color:var(--text2);border:1px solid var(--border)}
.stats{display:flex;border-top:1px solid var(--border)}
.stat{flex:1;padding:9px 6px;text-align:center;border-right:1px solid var(--border)}
.stat:last-child{border-right:none}
.sv{font-size:19px;font-weight:700}.sk{font-size:10px;color:var(--text2);margin-top:2px}
.toolbar{padding:9px 12px;border-bottom:1px solid var(--border);background:var(--bg2);display:flex;flex-wrap:wrap;gap:5px;align-items:center}
.fb{padding:5px 11px;border-radius:20px;border:1px solid var(--border);font-size:11px;font-weight:500;cursor:pointer;background:var(--bg3);color:var(--text2)}
.fb.on{background:var(--amber);color:#fff;border-color:var(--amber)}
.psel{margin-left:auto;padding:5px 8px;border-radius:var(--rsm);border:1px solid var(--border);background:var(--bg3);color:var(--text2);font-size:11px}
.sw{padding:8px 12px;border-bottom:1px solid var(--border)}
.si{width:100%;padding:8px 12px;border-radius:var(--rsm);border:1px solid var(--border);background:var(--bg3);color:var(--text);font-size:13px}
.si::placeholder{color:var(--text3)}
.list{padding:0 12px 100px}
.shd{font-size:10px;font-weight:600;color:var(--text3);padding:13px 0 5px;text-transform:uppercase;letter-spacing:.06em;border-top:1px solid var(--border);margin-top:4px;display:flex;align-items:center;gap:6px}
.shd:first-child{border-top:none}
.sc{background:var(--bg3);color:var(--text2);font-size:10px;padding:1px 6px;border-radius:10px}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:11px 13px;margin-bottom:7px;cursor:pointer}
.card.visited{border-left:3px solid var(--green)}.card.planned{border-left:3px solid var(--blue)}.card.unvisited{border-left:3px solid var(--border)}
.cn{font-size:13px;font-weight:500;flex:1;line-height:1.35}.cm{font-size:10px;color:var(--text3);margin-top:3px}
.badge{font-size:10px;font-weight:500;padding:2px 8px;border-radius:10px;white-space:nowrap;flex-shrink:0}
.badge.visited{background:rgba(76,175,114,.2);color:var(--green)}.badge.planned{background:rgba(91,155,240,.2);color:var(--blue)}.badge.unvisited{background:var(--bg3);color:var(--text3)}
.tags{display:flex;flex-wrap:wrap;gap:4px;margin-top:6px}
.tag{font-size:10px;font-weight:500;padding:2px 7px;border-radius:4px}
.fab{position:fixed;bottom:24px;right:20px;width:52px;height:52px;border-radius:50%;background:var(--amber);color:#fff;border:none;font-size:24px;cursor:pointer;box-shadow:0 4px 16px rgba(232,160,32,.4);display:flex;align-items:center;justify-content:center;z-index:60}
.mbg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:100;align-items:flex-end;justify-content:center}
.mbg.open{display:flex}
.modal{background:var(--bg2);border-radius:var(--radius) var(--radius) 0 0;padding:18px 16px 36px;width:100%;max-width:480px;max-height:92vh;overflow-y:auto}
@media(min-width:480px){.modal{border-radius:var(--radius)}.mbg{align-items:center}}
.mhd{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.mt{font-size:15px;font-weight:600}
.mc{background:none;border:none;color:var(--text2);font-size:24px;cursor:pointer;padding:0 4px}
.fl{margin-bottom:13px}.fl label{font-size:11px;color:var(--text2);display:block;margin-bottom:5px;font-weight:500}
.fl input,.fl select,.fl textarea{width:100%;padding:9px 11px;border:1px solid var(--border);border-radius:var(--rsm);background:var(--bg3);color:var(--text);font-size:13px}
.fl textarea{height:68px;resize:vertical}
.fl input:focus,.fl select:focus,.fl textarea:focus{outline:none;border-color:var(--amber)}
.srow{display:flex;gap:6px;margin-top:4px}
.star{font-size:24px;cursor:pointer;opacity:.25;line-height:1}
.star.on{opacity:1}
.hint{background:var(--bg3);border:1px solid var(--border);border-radius:var(--rsm);padding:10px 12px;margin:10px 0 0;font-size:11px;color:var(--text2);line-height:1.6}
.mbtns{display:flex;gap:8px;margin-top:18px}
.bp{flex:1;padding:12px;background:var(--amber);color:#fff;border:none;border-radius:var(--rsm);font-size:13px;font-weight:600;cursor:pointer}
.bd2{padding:12px 14px;background:rgba(224,85,85,.15);color:var(--red);border:1px solid rgba(224,85,85,.3);border-radius:var(--rsm);font-size:13px;cursor:pointer}
.bc{padding:12px 14px;background:var(--bg3);color:var(--text2);border:1px solid var(--border);border-radius:var(--rsm);font-size:13px;cursor:pointer}
.toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:#2E3347;color:var(--text);padding:10px 20px;border-radius:20px;font-size:12px;font-weight:500;z-index:200;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1}
.empty{text-align:center;padding:48px 16px;color:var(--text2)}
</style>
</head>
<body>
<div class="hdr">
  <div class="hdr-top">
    <span style="font-size:20px">🏍️</span>
    <div><div class="hdr-title">全国ツーリング記録帳</div><div class="hdr-sub">既訪・未訪・計画中スポットを全国管理</div></div>
    <div class="hdr-btns">
      <button class="hbtn hbtn-i" onclick="document.getElementById('fi').click()">📂 読込</button>
      <button class="hbtn hbtn-e" onclick="exportHTML()">💾 保存</button>
    </div>
  </div>
  <div class="stats" id="stats"></div>
</div>
<div class="toolbar">
  <button class="fb on" onclick="sf('all',this)">すべて</button>
  <button class="fb" onclick="sf('visited',this)">✅ 訪問済み</button>
  <button class="fb" onclick="sf('planned',this)">📅 計画中</button>
  <button class="fb" onclick="sf('unvisited',this)">⬜ 未訪問</button>
  <select class="psel" onchange="sp(this.value)">
    <option value="all">🗾 全国</option>
    <option>長野県</option><option>山梨県</option><option>静岡県</option><option>神奈川県</option>
    <option>群馬県</option><option>福島県</option><option>岐阜県</option><option>富山県</option>
    <option>高知県</option><option>愛媛県</option><option>徳島県</option><option>香川県</option><option>その他</option>
  </select>
</div>
<div class="sw"><input class="si" id="sq" placeholder="🔍 スポット名・メモで検索..." oninput="render()"></div>
<div class="list" id="list"></div>
<button class="fab" onclick="openM()">＋</button>
<input type="file" id="fi" accept=".json,.html" style="display:none" onchange="importF(event)">
<div class="toast" id="toast"></div>

<div class="mbg" id="modal">
  <div class="modal">
    <div class="mhd"><div class="mt" id="mt">スポットを追加</div><button class="mc" onclick="closeM()">×</button></div>
    <div class="fl"><label>スポット名 *</label><input id="fn" placeholder="例：大王わさび農場"></div>
    <div class="fl"><label>都道府県 *</label>
      <select id="fp"><option>長野県</option><option>山梨県</option><option>静岡県</option><option>神奈川県</option><option>群馬県</option><option>福島県</option><option>岐阜県</option><option>富山県</option><option>高知県</option><option>愛媛県</option><option>徳島県</option><option>香川県</option><option>その他</option></select>
    </div>
    <div class="fl"><label>カテゴリ</label>
      <select id="fc"><option>絶景・展望</option><option>道の駅</option><option>温泉・サウナ</option><option>グルメ</option><option>快走路</option><option>自然・公園</option><option>観光スポット</option><option>宿泊</option></select>
    </div>
    <div class="fl"><label>状態</label>
      <select id="fs"><option value="unvisited">⬜ 未訪問</option><option value="planned">📅 計画中</option><option value="visited">✅ 訪問済み</option></select>
    </div>
    <div class="fl"><label>評価（訪問済みの場合）</label>
      <div class="srow" id="stars">
        <span class="star" onclick="setStar(1)">⭐</span><span class="star" onclick="setStar(2)">⭐</span><span class="star" onclick="setStar(3)">⭐</span><span class="star" onclick="setStar(4)">⭐</span><span class="star" onclick="setStar(5)">⭐</span>
      </div>
    </div>
    <div class="fl"><label>訪問日</label><input id="fd" type="date"></div>
    <div class="fl"><label>メモ・感想</label><textarea id="fm" placeholder="感想・注意点・おすすめポイントなど"></textarea></div>
    <div class="hint">💡 編集後は <b style="color:var(--amber)">「💾 保存」</b>でHTMLを再生成し、GitHubに上書きアップロードしてください。</div>
    <div class="mbtns">
      <button class="bc" onclick="closeM()">キャンセル</button>
      <button class="bd2" id="bdel" style="display:none" onclick="delS()">削除</button>
      <button class="bp" onclick="saveS()">保存</button>
    </div>
  </div>
</div>

var spots = JSON.parse(JSON.stringify(SPOTS_DATA));
var flt='all', pft='all', cst=0, eid=null;

var CC={
  '絶景・展望':'background:rgba(91,155,240,.15);color:#5B9BF0',
  '道の駅':'background:rgba(232,160,32,.15);color:#E8A020',
  '温泉・サウナ':'background:rgba(76,175,114,.15);color:#4CAF72',
  'グルメ':'background:rgba(224,85,85,.15);color:#E05555',
  '快走路':'background:rgba(120,200,80,.15);color:#78C850',
  '自然・公園':'background:rgba(80,180,120,.15);color:#50B478',
  '観光スポット':'background:rgba(160,120,220,.15);color:#A078DC',
  '宿泊':'background:rgba(139,145,168,.15);color:#8B91A8'
};

function sf(f,btn){flt=f;document.querySelectorAll('.fb').forEach(function(b){b.classList.remove('on')});btn.classList.add('on');render()}
function sp(p){pft=p;render()}
function setStar(n){cst=n;document.querySelectorAll('.star').forEach(function(s,i){s.classList.toggle('on',i<n)})}

function render(){
  var q=document.getElementById('sq').value;
  var fl=spots.filter(function(s){
    if(flt!=='all'&&s.status!==flt)return false;
    if(pft!=='all'&&s.pref!==pft)return false;
    if(q&&!s.name.includes(q)&&!(s.memo||'').includes(q))return false;
    return true;
  });
  var v=spots.filter(function(s){return s.status==='visited'}).length;
  var p=spots.filter(function(s){return s.status==='planned'}).length;
  var u=spots.filter(function(s){return s.status==='unvisited'}).length;
  document.getElementById('stats').innerHTML=
    '<div class="stat"><div class="sv">'+spots.length+'</div><div class="sk">総スポット</div></div>'+
    '<div class="stat"><div class="sv" style="color:var(--green)">'+v+'</div><div class="sk">✅訪問済み</div></div>'+
    '<div class="stat"><div class="sv" style="color:var(--blue)">'+p+'</div><div class="sk">📅計画中</div></div>'+
    '<div class="stat"><div class="sv" style="color:var(--gray)">'+u+'</div><div class="sk">⬜未訪問</div></div>';
  if(!fl.length){document.getElementById('list').innerHTML='<div class="empty">🏍️<br><br>該当するスポットがありません</div>';return}
  var grp={visited:[],planned:[],unvisited:[]};
  fl.forEach(function(s){grp[s.status].push(s)});
  var lbl={visited:'✅ 訪問済み',planned:'📅 計画中',unvisited:'⬜ 未訪問'};
  var html='';
  ['visited','planned','unvisited'].forEach(function(st){
    if(!grp[st].length)return;
    html+='<div class="shd">'+lbl[st]+'<span class="sc">'+grp[st].length+'</span></div>';
    grp[st].forEach(function(s){
      var stars=s.stars?'⭐'.repeat(s.stars):'';
      var cc=CC[s.cat]||'background:var(--bg3);color:var(--text2)';
      html+='<div class="card '+st+'" onclick="editS('+s.id+')">'+
        '<div style="display:flex;align-items:flex-start;gap:8px">'+
          '<div style="flex:1"><div class="cn">'+s.name+'</div><div class="cm">'+s.pref+(s.date?' · '+s.date:'')+(stars?' · '+stars:'')+'</div></div>'+
          '<span class="badge '+st+'">'+(st==='visited'?'訪問済み':st==='planned'?'計画中':'未訪問')+'</span>'+
        '</div>'+
        '<div class="tags">'+
          '<span class="tag" style="'+cc+'">'+s.cat+'</span>'+
          (s.memo?'<span class="tag" style="background:rgba(255,255,255,.04);color:var(--text2);max-width:230px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;display:inline-block">'+s.memo+'</span>':'')+
        '</div></div>';
    });
  });
  document.getElementById('list').innerHTML=html;
}

function openM(s){
  eid=s?s.id:null;
  document.getElementById('mt').textContent=s?'スポットを編集':'スポットを追加';
  document.getElementById('fn').value=s?s.name:'';
  document.getElementById('fp').value=s?s.pref:'長野県';
  document.getElementById('fc').value=s?s.cat:'絶景・展望';
  document.getElementById('fs').value=s?s.status:'unvisited';
  document.getElementById('fd').value=s?s.date:'';
  document.getElementById('fm').value=s?s.memo:'';
  document.getElementById('bdel').style.display=s?'':'none';
  cst=s?s.stars:0;
  document.querySelectorAll('.star').forEach(function(el,i){el.classList.toggle('on',i<cst)});
  document.getElementById('modal').classList.add('open');
}
function closeM(){document.getElementById('modal').classList.remove('open');eid=null}
function editS(id){openM(spots.find(function(s){return s.id===id}))}

function saveS(){
  var name=document.getElementById('fn').value.trim();
  if(!name){showT('スポット名を入力してください');return}
  var obj={id:eid||Date.now(),name:name,pref:document.getElementById('fp').value,cat:document.getElementById('fc').value,status:document.getElementById('fs').value,stars:cst,date:document.getElementById('fd').value,memo:document.getElementById('fm').value.trim()};
  if(eid){spots=spots.map(function(s){return s.id===eid?obj:s})}
  else{spots.push(obj)}
  closeM();render();
  showT(eid?'更新しました ✅ 「💾 保存」で反映してください':'追加しました ✅ 「💾 保存」で反映してください',3500);
}
function delS(){
  if(!confirm('このスポットを削除しますか？'))return;
  spots=spots.filter(function(s){return s.id!==eid});
  closeM();render();showT('削除しました。「💾 保存」で反映してください',3000);
}

function exportHTML(){
  var json=JSON.stringify(spots,null,2);
  var src=document.documentElement.outerHTML;
  var updated=src.replace(/var SPOTS_DATA = \[[\s\S]*?\];/,'var SPOTS_DATA = '+json+';');
  var blob=new Blob([updated],{type:'text/html;charset=utf-8'});
  var a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='touring_record.html';a.click();
  showT('HTMLを生成しました。GitHubのindex.htmlに上書きアップロードしてください 💾',4000);
}
function importF(e){
  var file=e.target.files[0];if(!file)return;
  var reader=new FileReader();
  reader.onload=function(ev){
    try{var data=JSON.parse(ev.target.result);if(Array.isArray(data)){spots=data;render();showT('インポートしました（'+data.length+'件）',3000)}else{showT('データ形式が正しくありません')}}
    catch(err){showT('読み込みに失敗しました')}
  };
  reader.readAsText(file);e.target.value='';
}
function showT(msg,ms){
  ms=ms||2500;var t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(function(){t.classList.remove('show')},ms);
}
document.getElementById('modal').addEventListener('click',function(e){if(e.target===this)closeM()});
render();
</script>
